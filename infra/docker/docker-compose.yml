services:
  postgres:
    image: postgres:17-alpine

    container_name: dayforge-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: dayforge
      POSTGRES_PASSWORD: dayforge
      POSTGRES_DB: dayforge

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: